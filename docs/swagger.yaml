        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_georgifotev1_nuvelaone-api_pkg_jsonutil.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
