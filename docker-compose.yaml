services:
    db:
        image: postgres:17-alpine
        container_name: ${DB_DOCKER_CONTAINER:-nuvelaone-db}
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: ${DB_DOCKER_USER}
            POSTGRES_PASSWORD: ${DB_DOCKER_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - db_data:/var/lib/postgresql/data
        networks:
            - nuvelaone-network

    redis:
        image: redis:7-alpine
        container_name: ${REDIS_CONTAINER:-nuvelaone-redis}
        ports:
            - "6379:6379"
        command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
        volumes:
            - redis_data:/data
        networks:
            - nuvelaone-network

volumes:
    db_data:
    redis_data:

networks:
    nuvelaone-network:
        driver: bridge
