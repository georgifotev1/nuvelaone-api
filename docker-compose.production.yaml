services:
    api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nuvelaone-api
        restart: unless-stopped
        environment:
            - PORT=8080
            - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable
            - JWT_SECRET=${JWT_SECRET}
            - ENV=production
        depends_on:
            db:
                condition: service_healthy
        networks:
            - nuvelaone-network

    db:
        image: postgres:17-alpine
        container_name: nuvelaone-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - nuvelaone-network

    redis:
        image: redis:7-alpine
        container_name: nuvelaone-redis
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD}
        volumes:
            - redis_data:/data
        networks:
            - nuvelaone-network

    nginx:
        image: nginx:alpine
        container_name: nuvelaone-nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
            - ./data/certbot:/var/www/certbot
            - ./data/certbot/conf:/etc/letsencrypt
        depends_on:
            - api
        networks:
            - nuvelaone-network

    certbot:
        image: certbot/certbot:latest
        container_name: nuvelaone-certbot
        volumes:
            - ./data/certbot:/var/www/certbot
            - ./data/certbot/conf:/etc/letsencrypt
        command: certonly --webroot --webroot-path=/var/www/certbot --email ${CERTBOT_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN}
        profiles:
            - certbot
        networks:
            - nuvelaone-network

volumes:
    db_data:
    redis_data:

networks:
    nuvelaone-network:
        driver: bridge
